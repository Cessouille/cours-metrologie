apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Grafana
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Alertmanager
      - containerPort: 30093
        hostPort: 9093
        protocol: TCP
      # Demo-app
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
    extraMounts:
      - hostPath: ./grafana
        containerPath: /var/lib/grafana-dashboards
