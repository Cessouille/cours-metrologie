apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alert.rules"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager.monitoring.svc.cluster.local:9093"

    scrape_configs:
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

  alert.rules: |
    groups:
      - name: demo-alerts
        rules:
          # Alerte 1A : Cible de scrape inaccessible (pod en crash ou port fermé)
          - alert: ComponentScrapeDown
            expr: up == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Scrape échoué : {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Prometheus n'arrive pas à récupérer les métriques du pod {{ $labels.pod }} dans le namespace {{ $labels.namespace }}."

          # Alerte 1B : Déploiement obligatoire indisponible (gère le cas replicas = 0)
          - alert: ComponentDeploymentUnavailable
            expr: kube_deployment_status_replicas_available{deployment=~"prometheus|alertmanager|grafana|kube-state-metrics|demo-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Déploiement indisponible : {{ $labels.namespace }}/{{ $labels.deployment }}"
              description: "Le déploiement {{ $labels.deployment }} n'a plus aucun réplica disponible dans le cluster."

          # Alerte 1C : DaemonSet système indisponible
          - alert: ComponentDaemonSetUnavailable
            expr: kube_daemonset_status_number_unavailable{daemonset="node-exporter"} > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "DaemonSet indisponible : {{ $labels.namespace }}/{{ $labels.daemonset }}"
              description: "Le DaemonSet {{ $labels.daemonset }} est indisponible sur un ou plusieurs nœuds du cluster."

          # Alerte 2 : Trop d'erreurs HTTP 5xx
          - alert: HighHttp5xxErrorRate
            expr: sum(increase(http_requests_total{code=~"5.."}[5m])) > 10
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Taux d'erreurs HTTP 5xx élevé"
              description: "L'application a généré plus de 10 erreurs HTTP 5xx au cours des 5 dernières minutes (valeur actuelle : {{ $value }})."

          # Alerte 3 : Alertmanager indisponible dans Kubernetes
          - alert: AlertmanagerDeploymentUnavailable
            expr: kube_deployment_status_replicas_available{deployment="alertmanager", namespace="monitoring"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Déploiement Alertmanager indisponible"
              description: "Le nombre de réplicas disponibles pour Alertmanager dans Kubernetes est de 0."

          # Alerte 4 : Alerte propre à l'application
          - alert: DemoAppQueueBacklogTooHigh
            expr: demo_app_queue_backlog_size > 50
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Taille de la file d'attente trop élevée"
              description: "La taille de la file d'attente (backlog) a dépassé 50 éléments pendant plus d'une minute (valeur actuelle : {{ $value }})."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.3
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: storage-volume
              mountPath: /prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
        - name: storage-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
      name: web
  selector:
    app: prometheus
