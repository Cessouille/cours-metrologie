input {
  file {
    path => "/usr/share/logstash/Air_Quality.log"
    mode => "read"
    exit_after_read => true
    sincedb_path => "/dev/null"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/air_quality_done.log"
  }
}

filter {
  csv {
    separator => ","
    columns => [
      "unique_id", "indicator_id", "name", "measure", "measure_info",
      "geo_type_name", "geo_join_id", "geo_place_name", "time_period",
      "start_date", "data_value", "message_field"
    ]
    skip_header => true
  }
  
  # Drop the header row if it wasn't skipped by the CSV filter
  if [unique_id] == "Unique ID" or [unique_id] == "unique_id" {
    drop { }
  }
  
  # Parse the start_date field as the standard event timestamp
  # Format in CSV is MM/dd/yyyy (e.g. 06/01/2013)
  date {
    match => [ "start_date", "MM/dd/yyyy" ]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Convert data values to correct data types
  mutate {
    convert => {
      "unique_id" => "integer"
      "indicator_id" => "integer"
      "geo_join_id" => "integer"
      "data_value" => "float"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "air-quality-data"
  }
  stdout {
    codec => dots
  }
}
