apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Kibana
      - containerPort: 30561
        hostPort: 5601
        protocol: TCP
      # Elasticsearch
      - containerPort: 30920
        hostPort: 9200
        protocol: TCP
      # Demo-app
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
    extraMounts:
      - hostPath: datasets
        containerPath: /datasets
        readOnly: true
      - hostPath: kibana
        containerPath: /kibana
        readOnly: true
